name: release

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Expected .xgc2/product.yml version
        required: true
        type: string
      expected_source_sha:
        description: Expected source commit SHA
        required: true
        type: string
      publish_apt:
        description: Publish debs to the APT repository
        required: true
        type: boolean
        default: false
      run_cpp_quality:
        description: Run C++ quality checks
        required: true
        type: boolean
        default: false
      run_source_tests:
        description: Run source tests
        required: true
        type: boolean
        default: false

      release_id:
        description: Parent orchestrator run id used for correlation and audit.
        required: false
        default: ""
        type: string
      release_lock_digest:
        description: SHA256 of the immutable release lock.
        required: false
        default: ""
        type: string
      trusted_ci_run_id:
        description: Exact successful push CI run whose trusted deb artifacts may be reused
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read

jobs:
  release-guard:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Validate release inputs
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          EXPECTED_SOURCE_SHA: ${{ inputs.expected_source_sha }}
        run: |
          set -euo pipefail
          product_version="$(awk -F': *' '/^version:[[:space:]]*/ {print $2; exit}' .xgc2/product.yml)"
          if [[ "${product_version}" != "${EXPECTED_VERSION}" ]]; then
            echo "product.yml version ${product_version} != expected_version ${EXPECTED_VERSION}" >&2
            exit 1
          fi
          source_sha="$(git rev-parse HEAD)"
          if [[ "${source_sha}" != "${EXPECTED_SOURCE_SHA}" ]]; then
            echo "HEAD ${source_sha} != expected_source_sha ${EXPECTED_SOURCE_SHA}" >&2
            exit 1
          fi

  release-checks:
    name: release-checks
    needs: release-guard
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Run release checks
        run: |
          set -euo pipefail
          git diff --check HEAD
          .xgc2/scripts/check_package_compliance.sh
          if [[ "${{ inputs.run_cpp_quality }}" == "true" ]]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends clang-format
            find src -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) -print0 |
              xargs -0 clang-format --dry-run --Werror
          fi
          if [[ "${{ inputs.run_source_tests }}" == "true" ]]; then
            echo "source tests are covered by the CMake build and installed package smoke check"
          fi

  build:
    name: debs-${{ matrix.distro }}-${{ matrix.arch }}
    needs:
      - release-guard
      - release-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: focal
            ubuntu_version: "20.04"
            arch: amd64
            runner: ubuntu-latest
          - distro: focal
            ubuntu_version: "20.04"
            arch: arm64
            runner: ubuntu-24.04-arm
          - distro: jammy
            ubuntu_version: "22.04"
            arch: amd64
            runner: ubuntu-latest
          - distro: jammy
            ubuntu_version: "22.04"
            arch: arm64
            runner: ubuntu-24.04-arm
          - distro: noble
            ubuntu_version: "24.04"
            arch: amd64
            runner: ubuntu-latest
          - distro: noble
            ubuntu_version: "24.04"
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download trusted CI artifacts
        if: ${{ inputs.trusted_ci_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.trusted_ci_run_id }}
          name: xgc2-vrpn-router-${{ matrix.distro }}-${{ matrix.arch }}
          path: trusted-input

      - name: Verify and stage trusted CI artifacts
        if: ${{ inputs.trusted_ci_run_id != '' }}
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py verify-build \
            --artifact-dir trusted-input \
            --deb-output-dir debs \
            --manifest-output-dir build-manifests \
            --product xgc2-vrpn-router \
            --distribution "${{ matrix.distro }}" \
            --architecture "${{ matrix.arch }}" \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --ci-run-id "${{ inputs.trusted_ci_run_id }}"

      - name: Build and install-check deb package in Docker
        if: ${{ inputs.trusted_ci_run_id == '' }}
        run: |
          set -euo pipefail
          .xgc2/scripts/build_deb_in_docker.sh \
            --ubuntu-version "${{ matrix.ubuntu_version }}" \
            --work-dir "$RUNNER_TEMP/vrpn-router-${{ matrix.distro }}-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Create fallback build manifest
        if: ${{ inputs.trusted_ci_run_id == '' }}
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py build \
            --deb-dir debs \
            --output-dir build-manifests \
            --product xgc2-vrpn-router \
            --product-version "${{ inputs.expected_version }}" \
            --distribution "${{ matrix.distro }}" \
            --architecture "${{ matrix.arch }}" \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --ci-run-id "$GITHUB_RUN_ID" \
            --ci-workflow "$GITHUB_WORKFLOW" \
            --ci-workflow-ref "$GITHUB_WORKFLOW_REF"

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-vrpn-router-${{ matrix.distro }}-${{ matrix.arch }}
          path: |
            debs/*.deb
            build-manifests/*.json
          retention-days: 14
          include-hidden-files: true

  publish-apt:
    if: ${{ inputs.publish_apt }}
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: xgc2-apt-${{ matrix.distribution }}
      cancel-in-progress: false
    strategy:
      max-parallel: 1
      matrix:
        distribution: [focal, jammy, noble]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Download all architecture artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xgc2-vrpn-router-${{ matrix.distribution }}-*
          path: release-input

      - name: Validate artifacts and create release manifests
        run: |
          for arch in amd64 arm64; do
            python3 .xgc2/scripts/xgc2_artifact_manifest.py verify-build \
              --artifact-dir release-input \
              --deb-output-dir staged/debs \
              --manifest-output-dir staged/build-manifests \
              --product xgc2-vrpn-router \
              --distribution "${{ matrix.distribution }}" \
              --architecture "$arch" \
              --source-sha "${{ inputs.expected_source_sha }}"
          done
          python3 .xgc2/scripts/xgc2_artifact_manifest.py release \
            --deb-dir staged/debs \
            --build-manifest-dir staged/build-manifests \
            --publish-dir publish \
            --product xgc2-vrpn-router \
            --product-version "${{ inputs.expected_version }}" \
            --distribution "${{ matrix.distribution }}" \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --release-id "${{ inputs.release_id || github.run_id }}" \
            --release-lock-digest "${{ inputs.release_lock_digest }}"

      - name: Publish one distribution atomically
        env:
          APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
          APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
          APT_REPO_USER: ${{ secrets.APT_REPO_USER }}
          APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
          APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}
        run: |
          .xgc2/scripts/publish_apt_repo.sh \
            --deb-dir publish \
            --distribution "${{ matrix.distribution }}"
