name: build-debs

on:
  push:
    branches:
      - mavros-noetic
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
      APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
      APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
      APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}

    steps:
      - uses: actions/checkout@v4

      - name: Build and install-check deb package in Docker
        run: |
          .xgc2/scripts/build_debs_in_docker.sh \
            --work-dir "$RUNNER_TEMP/vrpn-router-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-vrpn-router-debs-${{ matrix.arch }}
          path: debs/*.deb

      - name: Publish to self-hosted APT repository
        if: ${{ env.APT_REPO_HOST != '' && env.APT_REPO_PORT != '' && env.APT_REPO_SSH_KEY != '' && env.APT_REPO_KNOWN_HOSTS != '' }}
        run: .xgc2/scripts/publish_apt_repo.sh --deb-dir debs
