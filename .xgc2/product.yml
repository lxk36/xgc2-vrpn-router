schema: xgc2.product.v1
id: xgc2-vrpn-router
name: XGC2 VRPN Router
version: 0.1.0-6
kind: toolchain-apt
summary: Protocol-level VRPN tracker relay packaged as a native Debian executable
  for Ubuntu 20.04, 22.04, and 24.04.
apt:
  distribution: focal,jammy,noble
  install:
  - xgc2-vrpn-router
  packages:
  - xgc2-vrpn-router
  depends:
  - libc6
  - libgcc-s1
  - libstdc++6
  - netbase
  - systemd
usage:
  install: 'sudo apt update

    sudo apt install xgc2-vrpn-router

    '
  smoke_test: 'command -v xgc2-vrpn-router

    xgc2-vrpn-router --check-config --config /etc/xgc2/vrpn-router/router.conf

    '
release:
  apt_versions:
    focal: 0.1.0-6+focal
    jammy: 0.1.0-6+jammy
    noble: 0.1.0-6+noble
ownership:
  paths:
  - /usr/bin/xgc2-vrpn-router
  - /etc/xgc2/vrpn-router/router.conf
  - /lib/systemd/system/xgc2-vrpn-router.service
